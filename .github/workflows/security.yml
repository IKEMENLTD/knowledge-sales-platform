name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # weekly Monday 02:00 UTC = 11:00 JST 月曜
    - cron: "0 2 * * 1"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  # ---------------------------------------------------------------------------
  # gitleaks : commit に secret が混入していないかスキャン
  # ---------------------------------------------------------------------------
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE は org 用 (free tier はそのまま動く)。未設定でも可。

  # ---------------------------------------------------------------------------
  # audit : pnpm audit を warn-only で実行 (HIGH 以上を検出してログ表示)
  # ---------------------------------------------------------------------------
  audit:
    name: pnpm audit (warn-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit (high+)
        run: pnpm audit --audit-level=high || echo "::warning::pnpm audit reported HIGH+ vulnerabilities — review weekly"

  # ---------------------------------------------------------------------------
  # codeql : JavaScript / TypeScript SAST (best-effort)
  # ---------------------------------------------------------------------------
  codeql:
    name: codeql (js/ts)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript"]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
