name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PNPM_VERSION: 9.12.0

jobs:
  # ---------------------------------------------------------------------------
  # check : format / lint / typecheck / unit test (vitest)
  # ---------------------------------------------------------------------------
  check:
    name: lint / typecheck / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check (biome)
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests (vitest)
        run: pnpm test

  # ---------------------------------------------------------------------------
  # sql-syntax : pgvector/pgmq 拡張入り Postgres で migration を dry-run
  # ---------------------------------------------------------------------------
  sql-syntax:
    name: sql syntax (pgvector / pgmq dry-run)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install psycopg2
        run: pip install --upgrade pip psycopg2-binary

      - name: Pre-create extensions
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -c "create extension if not exists pgcrypto;"
          psql -h localhost -U postgres -d postgres -c "create extension if not exists vector;"
          # pgmq は CI image に含まれない場合があるため try & ignore (本番は Supabase Pro で enable)
          psql -h localhost -U postgres -d postgres -c "create extension if not exists pgmq;" || \
            echo "pgmq extension not available in CI image — apply_migrations.py --dry-run will skip pgmq DDL"

      - name: Apply migrations (dry-run)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: |
          if [ -f scripts/apply_migrations.py ]; then
            python scripts/apply_migrations.py --dry-run || \
              echo "::warning::apply_migrations.py --dry-run reported issues (non-blocking until GROUP A lands ledger)"
          else
            echo "::warning::scripts/apply_migrations.py not found, skipping"
          fi

  # ---------------------------------------------------------------------------
  # build : artifact 確認のみ (deploy はしない、Render の autoDeploy が main で実行)
  # ---------------------------------------------------------------------------
  build:
    name: build (web + worker)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages (turbo)
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            apps/web/.next/**
            apps/worker/dist/**
            !**/cache/**

  # ---------------------------------------------------------------------------
  # e2e : playwright placeholder (実テストは tests/e2e/ で skip 状態)
  # ---------------------------------------------------------------------------
  e2e:
    name: e2e (playwright placeholder)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @ksp/web exec playwright install --with-deps chromium || echo "::warning::playwright not installed in @ksp/web yet"

      - name: Run E2E tests
        run: pnpm e2e || echo "::warning::e2e suite is in placeholder/skip state"
