<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.07 0 0 0 0 0.06 0 0 0 0 0.04 0 0 0 0.06 0"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="#fafaf6"/>
  <rect width="1200" height="630" filter="url(#grain)"/>
  <!-- Editorial column rule -->
  <line x1="80" y1="80" x2="1120" y2="80" stroke="#1a212c" stroke-width="2"/>
  <text x="80" y="65" font-family="ui-sans-serif, system-ui" font-weight="600" font-size="20" letter-spacing="3.6" fill="#5b6573">№ 01 — KSP</text>

  <!-- Mark -->
  <g transform="translate(80 180)">
    <g fill="#131a26">
      <rect x="0" y="0" width="32" height="180" rx="3"/>
      <path d="M50 90 L130 0 L160 0 L70 96 Z"/>
      <path d="M70 84 L160 180 L130 180 L50 90 Z"/>
    </g>
    <rect x="148" y="148" width="32" height="32" rx="3" fill="#cf3a2d"/>
  </g>

  <!-- Title -->
  <text x="320" y="280" font-family="ui-sans-serif, system-ui" font-weight="700" font-size="84" letter-spacing="-3" fill="#0e1525">ksp.</text>
  <text x="320" y="365" font-family="ui-sans-serif, system-ui" font-weight="500" font-size="42" letter-spacing="-1" fill="#0e1525">営業ナレッジ × 商談アーカイブ</text>
  <text x="320" y="425" font-family="ui-sans-serif, system-ui" font-weight="400" font-size="22" letter-spacing="0" fill="#5b6573">Zoom録画・名刺・メールを構造化し、組織の営業知見に変える。</text>

  <!-- Footer rule -->
  <line x1="80" y1="550" x2="1120" y2="550" stroke="#1a212c" stroke-width="1"/>
  <text x="80" y="585" font-family="ui-sans-serif, system-ui" font-weight="500" font-size="16" letter-spacing="2.2" fill="#5b6573">KNOWLEDGE HOLDINGS — INTERNAL USE</text>
</svg>
